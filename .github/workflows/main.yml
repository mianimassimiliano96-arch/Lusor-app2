name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK with Buildozer (Docker)
        run: |
          docker run --rm -v "${{ github.workspace }}:/app" -w /app \
            --entrypoint /bin/bash \
            kivy/buildozer:latest \
            -c "yes | buildozer android debug"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lusor-APK
          path: bin/*.apk
